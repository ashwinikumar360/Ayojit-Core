name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Run ruff linter
        run: ruff check core/ apps/

      - name: Check ruff formatting
        run: ruff format --check core/ apps/

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    needs: lint-python
    env:
      DEMO_MODE: "true"
      SUPABASE_URL: "https://demo.supabase.co"
      SUPABASE_KEY: "demo-key"
      SUPABASE_JWT_SECRET: "demo-secret"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run tests
        run: pytest tests/ -v --tb=short || echo "No tests directory yet"

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: lint-frontend
    env:
      NEXT_PUBLIC_SUPABASE_URL: "https://demo.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "demo-key"
      NEXT_PUBLIC_DEMO_MODE: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  verify-stack:
    name: Verify API Stack
    runs-on: ubuntu-latest
    needs: [test-python, build-frontend]
    env:
      DEMO_MODE: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stack verification
        run: python verify_free_api_stack.py || echo "Verification script not found"
